services:
  # ============ DB ============
  mysql:
    image: mysql:8.0
    container_name: ott-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER} -p${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ============ Flyway 마이그레이션 해당 (먼저 기동) ============
  api-user:
    build:
      context: .
      dockerfile: apps/api-user/Dockerfile
    container_name: ott-api-user
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL}
      AWS_S3_PRESIGN_EXPIRE_SECONDS: ${AWS_S3_PRESIGN_EXPIRE_SECONDS}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_UNLINK_URL: ${KAKAO_UNLINK_URL}
      KAKAO_ADMIN_KEY: ${KAKAO_ADMIN_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      CF_SIGNED_COOKIE_KEY_PAIR_ID: ${CF_SIGNED_COOKIE_KEY_PAIR_ID}
      CF_SIGNED_COOKIE_PRIVATE_KEY_BASE64: ${CF_SIGNED_COOKIE_PRIVATE_KEY_BASE64}
      AI_BASE_URL: ${AI_BASE_URL}
    depends_on:
      mysql:
        condition: service_healthy
      machine:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ============ Flyway 완료 이후 빌드하는 앱 ============
  api-admin:
    build:
      context: .
      dockerfile: apps/api-admin/Dockerfile
    container_name: ott-api-admin
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL}
      AWS_S3_PRESIGN_EXPIRE_SECONDS: ${AWS_S3_PRESIGN_EXPIRE_SECONDS}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      CF_SIGNED_COOKIE_KEY_PAIR_ID: ${CF_SIGNED_COOKIE_KEY_PAIR_ID}
      CF_SIGNED_COOKIE_PRIVATE_KEY_BASE64: ${CF_SIGNED_COOKIE_PRIVATE_KEY_BASE64}
    depends_on:
      mysql:
        condition: service_healthy
  # ============ Message Queue ============
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ott-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping" ]
      interval: 10s
      timeout: 5s
      retries: 12

  # ============ Transcoder 워커 ============
  transcoder:
    build:
      context: .
      dockerfile: apps/transcoder/Dockerfile
    container_name: ott-transcoder
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

      TRANSCODER_MESSAGING_PROVIDER: ${TRANSCODER_MESSAGING_PROVIDER}
      TRANSCODER_FFMPEG_ENGINE: ${TRANSCODER_FFMPEG_ENGINE}
      FFMPEG_PATH: ${FFMPEG_PATH}

      TRANSCODER_FFPROBE_ENGINE: ${TRANSCODER_FFPROBE_ENGINE}
      FFPROBE_PATH: ${FFPROBE_PATH}
      
      TRANSCODER_TEMP_DIR: ${TRANSCODER_TEMP_DIR}
      TRANSCODER_SEGMENT_DURATION: ${TRANSCODER_SEGMENT_DURATION}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER}
      STORAGE_OUTPUT_DIR: ${STORAGE_OUTPUT_DIR}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      mysql:
        condition: service_healthy
      api-user:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ============ Monitoring ============
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ott-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./apps/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:12.4.0
    container_name: ott-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./apps/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

# ============ AI Server ============
  machine:
    build:
      context: .
      dockerfile: apps/machine/Dockerfile
    container_name: ott-machine
    ports:
      - "8000:8000"
    environment:
      - AI_MODEL_PATH=${AI_MODEL_PATH:-}
      - AI_BASE_URL=${AI_BASE_URL:-http://machine:8000} 
      - TIMEOUT_MS=2000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  prometheus-data:
  grafana-data:
