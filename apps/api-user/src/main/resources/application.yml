app:
  frontend-url: ${FRONTEND_URL:http://localhost:8080}

kakao:
  unlink-url: ${KAKAO_UNLINK_URL} # 카카오 회원탈퇴 할 링크
  admin-key: ${KAKAO_ADMIN_KEY} # 회원탈퇴, 서비스 앱의 어드민 키

server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/ott}
    username: ${SPRING_DATASOURCE_USERNAME:ott}
    password: ${SPRING_DATASOURCE_PASSWORD:ottpw}

  # kakao
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID} # REST API
            client-secret: ${KAKAO_CLIENT_SECRET} #Client Secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post # body에 넣어서 토큰 교환
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize # 로그인 화면
            token-uri: https://kauth.kakao.com/oauth/token # 받은 인가코드를 토큰으로 교환
            user-info-uri: https://kapi.kakao.com/v2/user/me # 유저 정보 가져오는 API
            user-name-attribute: id
  # flyway 설정
  flyway:
    enabled: true

  # JPA 설정
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    generate-ddl: false
    hibernate:
      ddl-auto: validate

    #배포 할 때는 open-in-view false 설정
    open-in-view: false
    properties:
      hibernate:
        show_sql: true
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

# JWT 설정
jwt:
  secret: ${JWT_SECRET_BASE64:}
  access-token-expiry: 1800000       # 30분
  refresh-token-expiry: 1209600000   # 14일

springdoc:
  api-docs:
    version: OPENAPI_3_0

cloudfront:
  signed-cookie:
    resource-url: https://cdn.openthetaste.cloud/*
    key-pair-id: ${CF_SIGNED_COOKIE_KEY_PAIR_ID:}
    private-key-base64: ${CF_SIGNED_COOKIE_PRIVATE_KEY_BASE64:}
    ttl-seconds: 2400000

ai:
  base-url: ${AI_BASE_URL:http://localhost:8000}